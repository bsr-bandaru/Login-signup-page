<!DOCTYPE html>
<html lang="en">
<head>
<title>Login & Signup</title>
 

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body {
    background: linear-gradient(-45deg, #ff6a00, #ee0979, #00c6ff, #0072ff);
    background-size: 400% 400%;
    animation: gradientMove 10s ease infinite;
}

@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.card {
    border-radius: 15px;
}.left img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.card {
    border-radius: 15px;
}

.otp-box {
    display: none;
    background: #e9f2ff;
    padding: 8px;
    border-radius: 6px;
    font-weight: bold;
    text-align: center;
}

.password-box {
    position: relative;
}
.password-box i {
    position: absolute;
    right: 12px;
    top: 12px;
    cursor: pointer;
}

/* NEW: OR TEXT STYLE */
.or-text {
    text-align: center;
    margin: 8px 0;
    font-weight: bold;
    color: #888;
}
</style>

</head>

<body class="bg-light">

<div class="container-fluid">
<div class="row min-vh-100">

<!-- LEFT IMAGE -->
<div class="col-lg-6 d-none d-lg-block p-0">
<img src="logo.jpg" class="img-fluid h-100 w-100">
</div>

<!-- RIGHT SIDE -->
<div class="col-lg-6 d-flex justify-content-center align-items-center">

<div class="card shadow p-4 w-100" style="max-width:400px;">

<!-- LOGIN / SIGNUP BUTTONS -->
<div class="d-flex w-100 mb-3 gap-2">
<button id="loginBtn" class="btn btn-outline-primary w-50 active">Login</button>
<button id="signupBtn" class="btn btn-outline-primary w-50">Sign Up</button>
</div>

<!-- LOGIN -->
<div id="loginForm">
<h5 class="text-center mb-3">Login</h5>

<input type="text" id="loginUser" class="form-control mb-2" placeholder="Username">

<div class="password-box mb-2">
<input type="password" id="loginPass" class="form-control" placeholder="Password">
<i class="fa fa-eye" onclick="togglePassword('loginPass', this)"></i>
</div>

<input type="text" id="mobile" class="form-control mb-2" placeholder="Mobile (Optional)">

<div id="loginOtpBox" class="otp-box mb-2"></div>

<input type="text" id="loginOTP" class="form-control mb-2" placeholder="Enter OTP">

<button class="btn btn-outline-primary w-100 mb-2" onclick="sendLoginOTP()">Send OTP</button>
<button class="btn btn-primary w-100 mb-3" onclick="login()">Login</button>

<div class="text-end mb-2">
<a href="#" onclick="forgotPassword()">Forgot Password?</a>
</div>

<hr>

<button class="btn btn-danger w-100 mb-2" onclick="googleLogin()">
<i class="fab fa-google"></i> Google
</button>

<button class="btn btn-primary w-100" onclick="facebookLogin()">
<i class="fab fa-facebook-f"></i> Facebook
</button>

</div>

<!-- SIGNUP -->
<div id="signupForm" class="d-none">
<h5 class="text-center mb-3">Sign Up</h5>

<input type="text" id="signUser" class="form-control mb-2" placeholder="Username">
<input type="email" id="signEmail" class="form-control mb-2" placeholder="Email">

<div class="password-box mb-2">
<input type="password" id="signPass" class="form-control" placeholder="Password">
<i class="fa fa-eye" onclick="togglePassword('signPass', this)"></i>
</div>

<!-- ✅ ADDED HERE (between password and mobile) -->
<div class="or-text">OR</div>

<input type="text" id="signMobile" class="form-control mb-2" placeholder="Mobile">

<div id="signupOtpBox" class="otp-box mb-2"></div>

<input type="text" id="signupOTP" class="form-control mb-2" placeholder="Enter OTP">

<button class="btn btn-outline-primary w-100 mb-2" onclick="sendSignupOTP()">Send OTP</button>
<button class="btn btn-success w-100" onclick="signup()">Create Account</button>

</div>

</div>
</div>

</div>
</div>



<script>

// TOGGLE
const loginBtn = document.getElementById("loginBtn");
const signupBtn = document.getElementById("signupBtn");
const loginForm = document.getElementById("loginForm");
const signupForm = document.getElementById("signupForm");

loginBtn.onclick = () => {
    loginForm.classList.remove("d-none");
    signupForm.classList.add("d-none");
    loginBtn.classList.add("active");
    signupBtn.classList.remove("active");
};

signupBtn.onclick = () => {
    signupForm.classList.remove("d-none");
    loginForm.classList.add("d-none");
    signupBtn.classList.add("active");
    loginBtn.classList.remove("active");
};

// PASSWORD TOGGLE
function togglePassword(id, icon) {
    let input = document.getElementById(id);
    if (input.type === "password") {
        input.type = "text";
        icon.classList.replace("fa-eye", "fa-eye-slash");
    } else {
        input.type = "password";
        icon.classList.replace("fa-eye-slash", "fa-eye");
    }
}

// OTP
let loginGeneratedOTP = null;
let signupGeneratedOTP = null;

function sendLoginOTP() {
    let mobile = document.getElementById("mobile").value;
    if(!/^[0-9]{10}$/.test(mobile)) return alert("Invalid mobile");

    loginGeneratedOTP = Math.floor(100000 + Math.random()*900000);
    let box = document.getElementById("loginOtpBox");
    box.style.display="block";
    box.innerText = "OTP: " + loginGeneratedOTP;
}

function sendSignupOTP() {
    let mobile = document.getElementById("signMobile").value;
    if(!/^[0-9]{10}$/.test(mobile)) return alert("Invalid mobile");

    signupGeneratedOTP = Math.floor(100000 + Math.random()*900000);
    let box = document.getElementById("signupOtpBox");
    box.style.display="block";
    box.innerText = "OTP: " + signupGeneratedOTP;
}

// LOGIN
function login() {
    let user = document.getElementById("loginUser").value;
    let pass = document.getElementById("loginPass").value;
    let mobile = document.getElementById("mobile").value;
    let otp = document.getElementById("loginOTP").value;

    let stored = JSON.parse(localStorage.getItem("user"));

    if(mobile !== "") {
        return otp == loginGeneratedOTP ? alert("Login Success") : alert("Wrong OTP");
    }

    if(!stored) return alert("No user");

    (user === stored.username && pass === stored.password)
    ? alert("Login Success")
    : alert("Invalid");
}

// SIGNUP
function signup() {
    let user = document.getElementById("signUser").value;
    let email = document.getElementById("signEmail").value;
    let pass = document.getElementById("signPass").value;
    let mobile = document.getElementById("signMobile").value;
    let otp = document.getElementById("signupOTP").value;

    if(mobile !== "") {
        if(otp != signupGeneratedOTP) return alert("Wrong OTP");
        localStorage.setItem("user", JSON.stringify({ mobile, password:"" }));
    } else {
        if(user===""||email===""||pass==="") return alert("Fill all");
        localStorage.setItem("user", JSON.stringify({ username:user, password:pass }));
    }

    alert("Signup Success");

    signupForm.classList.add("d-none");
    loginForm.classList.remove("d-none");
    loginBtn.classList.add("active");
    signupBtn.classList.remove("active");
}

// FORGOT PASSWORD
function forgotPassword() {

    let stored = JSON.parse(localStorage.getItem("user"));
    if(!stored) return alert("No account found");

    if(!stored.username) return alert("Signup with username to reset password");

    let user = prompt("Enter your username");

    if(user !== stored.username) {
        return alert("Username not found");
    }

    let otp = Math.floor(100000 + Math.random() * 900000);
    alert("Your OTP is: " + otp);

    let enteredOtp = prompt("Enter OTP");

    if(enteredOtp != otp) {
        return alert("Wrong OTP");
    }

    let newPass = prompt("Enter new password");

    if(newPass === "" || newPass === null) {
        return alert("Password cannot be empty");
    }

    stored.password = newPass;
    localStorage.setItem("user", JSON.stringify(stored));

    alert("Password updated successfully!");
}

// SOCIAL LOGIN (DEMO)
function googleLogin(){ window.open("https://accounts.google.com/"); }
function facebookLogin(){ window.open("https://facebook.com/"); }

</script>

</body>
</html>
